<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Index Sayfam</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --hover-color: #0ea5e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        p {
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .links {
            display: grid;
            gap: 15px;
        }

        .link-card {
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-card:hover {
            transform: translateY(-3px);
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hoş Geldiniz</h1>
        <p>Ben Tera Hakkımdakılere Bağlantılara Tıklayarak Ulaşabilirsiniz.</p>

        <div class="links">
            <a href="https://wa.me/212778308150" class="link-card" target="_blank">Whatsapp</a>
            <a href="https://t.me/JaegerTeam" class="link-card" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/c2dteraxd?igsh=eTNnaXh1ZmFud3k2" class="link-card" target="_blank">Sosyal Medya</a>
        </div>

        <div class="footer">
            &copy; 2026 Tüm Hakları Saklıdır.
        </div>
    </div>

</body>
</html>
