<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERAONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .kali-dragon {
            width: 100px;
            margin-bottom: 10px;
            filter: brightness(0) invert(1); /* Logoyu beyaza çevirir */
        }

        h1 {
            font-size: 28px;
            letter-spacing: 4px;
            margin: 10px 0;
            font-weight: bold;
        }

        .description {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }

        .profile-box {
            background: #161616;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-info b {
            display: block;
            font-size: 16px;
        }

        .profile-info span {
            font-size: 12px;
            color: #666;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }

        .social-icons a {
            color: #fff;
            font-size: 30px;
            text-decoration: none;
            transition: 0.3s;
        }

        /* Üzerine gelince renk değişimi */
        .fa-telegram:hover { color: #0088cc; }
        .fa-instagram:hover { color: #e1306c; }
        .fa-whatsapp:hover { color: #25d366; }

        .views {
            margin-top: 20px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://www.kali.org/images/kali-logo.svg" class="kali-dragon" alt="Kali">

        <h1>⚔️ TERA ⚔️</h1>
        
        <p class="description">
            Cyber security and ethical hacker<br>
            software and computer engineer
        </p>

        <div class="profile-box">
            <img src="https://i.pinimg.com/originals/e4/df/67/e4df67820067664687588e7b99c2794c.jpg" class="profile-img">
            <div class="profile-info">
                <b>c2dtera 🔥 FLEX</b>
                <span>last seen unknown</span>
            </div>
        </div>

        <div class="social-icons">
            <a href="https://t.me/teraxxl" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://www.instagram.com/c2dtera?igsh=eTNnaXh1ZmFud3k2" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/2250705006356" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>

        <div class="views">
            <i class="fas fa-eye"></i> 212
        </div>
    </div>

</body>
</html>
